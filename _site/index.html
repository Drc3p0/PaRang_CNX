<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% if page.title %}{{ page.title }} - {% endif %}Artist Name</title>
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="Artist Name">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Typography & Layout Styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/assets/css/raster2.css">
  <link rel="stylesheet" href="/assets/css/main.css">
  
  <style>
    /* Integrate Google Fonts dynamically into our main layout */
    body {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
    }
    code, pre, .mono, nav a, footer {
      font-family: 'Roboto Mono', monospace;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="main-wrapper" style="padding-top: 30px;">
    <!-- Responsive 9-Column Navigation Grid -->
    <nav style="margin-bottom: 4rem; border-bottom: 0.5px solid #222; padding-bottom: 20px; max-width: 42rem; margin-left: auto; margin-right: auto; padding-left: 20px; padding-right: 20px;">
      <r-grid columns="9" columns-s="3" style="--columnGap: 10px; --rowGap: 15px; text-align: center;">
        <r-cell><a href="/" class="mono" style="font-size: 0.8rem; border:none;">PROJECTS</a></r-cell>
        <r-cell><a href="/workshops.html" class="mono" style="font-size: 0.8rem; border:none;">WORKSHOPS</a></r-cell>
        <r-cell><a href="/music.html" class="mono" style="font-size: 0.8rem; border:none;">MUSIC</a></r-cell>
        <r-cell><a href="/about.html" class="mono" style="font-size: 0.8rem; border:none;">BIO</a></r-cell>
        <r-cell><a href="/resume.html" class="mono" style="font-size: 0.8rem; border:none;">RESUME</a></r-cell>
        <r-cell><a href="/exhibitions.html" class="mono" style="font-size: 0.8rem; border:none;">EXHIBITIONS</a></r-cell>
        <r-cell><a href="/residencies.html" class="mono" style="font-size: 0.8rem; border:none;">RESIDENCIES</a></r-cell>
        <r-cell><a href="/events.html" class="mono" style="font-size: 0.8rem; border:none;">EVENTS</a></r-cell>
        <r-cell><a href="/writings.html" class="mono" style="font-size: 0.8rem; border:none;">WRITINGS</a></r-cell>
      </r-grid>
    </nav>

    
<div class="homepage">
  <!-- Projects Grid Section -->
  <section id="projects" style="padding-top: 0;">
    <p><strong>Selected Projects</strong></p>
    <br>
    <!-- Grid of active projects (3 columns) -->
    <r-grid class="main-grid" columns="3" columns-s="1" style="--columnGap: 15px; --rowGap: 25px;">
      
                <r-cell class="thumbnail">
                  <a href="/project-1.html" class="thumbnail-link">
                    <img src="https://images.unsplash.com/photo-1547891654-e66ed7edd96c?q=80&w=600&auto=format&fit=crop" alt="Project Title 1">
                    <h3>Project Title 1</h3>
                  </a>
                </r-cell>
    </r-grid>

    <!-- Toggleable Archive Section -->
    
                    <p style="text-align: right; margin-top: 2rem;">
                      <a id="archive-btn" class="mono clickable" onclick="archiveClick(this, 'archive')" style="font-size: 0.85rem; border-bottom-style: dashed;">Archived Projects &rarr;</a>
                    </p>
                    <div id="archive" class="hidden" style="margin-top: 3rem; margin-bottom: 3rem;">
                      <main>
                        <r-grid class="main-grid" columns="4" columns-s="2" style="--columnGap: 10px; --rowGap: 20px;">
                          
                <r-cell class="thumbnail">
                  <a href="/project-2.html" class="thumbnail-link">
                    <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?q=80&w=600&auto=format&fit=crop" alt="Project Title 2 (Archived)" style="height: 120px;">
                    <h3 style="font-size: 0.85rem;">Project Title 2 (Archived)</h3>
                  </a>
                </r-cell>
                        </r-grid>
                      </main>
                    </div>
  </section>

  <!-- Footer block -->
  <hr style="margin-top: 4rem;">
  <footer>
    <span class="mono">&copy; Artist Name {{ 'now' | date: "%Y" }}</span>
  </footer>
</div>

<!-- Simple toggle script for archived projects list -->
<script>
function archiveClick(button, archiveId) {
  const archiveDiv = document.getElementById(archiveId);
  const isHidden = archiveDiv.classList.toggle('hidden');
  
  if (isHidden) {
    button.innerHTML = "Archived Projects &rarr;";
  } else {
    button.innerHTML = "Archived Projects &darr;";
    // Smooth scroll down to the expanded archive
    archiveDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}
</script>

  </div>
</body>
</html>
